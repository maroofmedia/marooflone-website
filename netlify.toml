# Catch-all / Redirect all unknown routes to 404
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

# Long-term cache for hashed/versioned assets (images, fonts, js)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Long-term cache for versioned stylesheet
[[headers]]
  for = "/style.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Default security headers for the whole site
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"

# Noindex specific images
[[headers]]
  for = "/assets/images/main-images/bfgi_logo.webp"
  [headers.values]
    X-Robots-Tag = "noindex"

[[headers]]
  for = "/assets/images/main-images/boomlive-logo.webp"
  [headers.values]
    X-Robots-Tag = "noindex"

[[headers]]
  for = "/assets/images/main-images/coding.webp"
  [headers.values]
    X-Robots-Tag = "noindex"
